<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#F2F2F7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="BucksBuddy" />
    <!-- black-translucent lets the page background show behind the status bar
         (the only thing iOS 26 still honors; theme-color is ignored there).
         Status-bar icons are forced white, so App renders a subtle scrim in the
         notch area to keep them legible on light screens. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="What's up, Doc? Your dead-simple money tracker." />

    <!-- Social share cards (Open Graph + Twitter). Absolute URLs because most
         scrapers (Facebook, LinkedIn, …) won't resolve relative ones. The
         1200×630 card lives in /public and is regenerated by
         scripts/generate-og.mjs. -->
    <link rel="canonical" href="https://bucksbuddy.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BucksBuddy" />
    <meta property="og:url" content="https://bucksbuddy.com/" />
    <meta property="og:title" content="BucksBuddy — For wabbits with bad habits." />
    <meta
      property="og:description"
      content="An on-the-go money tracker for every buck in and out, right from your pocket. Free, no ads, install anywhere."
    />
    <meta property="og:image" content="https://bucksbuddy.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="BucksBuddy — for wabbits with bad habits." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BucksBuddy — For wabbits with bad habits." />
    <meta
      name="twitter:description"
      content="An on-the-go money tracker for every buck in and out, right from your pocket."
    />
    <meta name="twitter:image" content="https://bucksbuddy.com/og-image.png" />

    <!-- Display font (Grobold) is self-hosted via @font-face; preload it so the
         cartoon hijack shows up fast. SF handles all body/UI text. -->
    <link
      rel="preload"
      href="/fonts/grobold.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <title>BucksBuddy</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
