name: CI

# Guard against regressions: every PR and every push to main must pass the
# unit suite with full coverage.
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit & coverage (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Type-check + production build must succeed.
      - run: npm run build
      # Enforces the 100% coverage thresholds from vitest.config.ts.
      - run: npm run coverage
